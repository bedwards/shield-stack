name: Deploy ScoreRebound
on:
  push:
    branches: [main]
    paths: ['scorerebound/**']
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: cd scorerebound && bun install --frozen-lockfile
      - name: Build
        run: cd scorerebound && bun run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name scorerebound --branch main
          workingDirectory: scorerebound
