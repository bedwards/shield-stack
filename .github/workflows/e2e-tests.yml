name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - "scorerebound/**"
      - "ghostboard/**"
      - ".github/workflows/e2e-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "scorerebound/**"
      - "ghostboard/**"
      - ".github/workflows/e2e-tests.yml"

jobs:
  e2e:
    name: E2E - ${{ matrix.product.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        product:
          - slug: scorerebound
            name: ScoreRebound
            port: 3010
          - slug: ghostboard
            name: GhostBoard
            port: 3020
    defaults:
      run:
        working-directory: ${{ matrix.product.slug }}
    env:
      CI: true
      TEST_MODE: "true"
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets[format('{0}_SUPABASE_URL', matrix.product.slug)] || secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets[format('{0}_SUPABASE_ANON_KEY', matrix.product.slug)] || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets[format('{0}_SERVICE_ROLE_KEY', matrix.product.slug)] || secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build application
        run: bun run build

      - name: Run all Playwright E2E tests
        run: bunx playwright test
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:${{ matrix.product.port }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.product.slug }}-playwright-report
          path: ${{ matrix.product.slug }}/playwright-report/
          retention-days: 14

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.product.slug }}-screenshots
          path: ${{ matrix.product.slug }}/screenshots/
          retention-days: 14

      - name: Upload test results and traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.product.slug }}-test-results
          path: ${{ matrix.product.slug }}/test-results/
          retention-days: 14

      # Visual regression tests (e2e/visual/) are excluded from CI.
      # They're platform-dependent (darwin vs linux baselines) and run
      # locally via RALPH verifier/monitor on macOS instead.
