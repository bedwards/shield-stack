name: Deploy BillWatch
on:
  push:
    branches: [main]
    paths: ['billwatch/**']
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: cd billwatch && bun install --frozen-lockfile
      - name: Build for Cloudflare Pages
        run: cd billwatch && bunx @cloudflare/next-on-pages
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name billwatch --branch main
          workingDirectory: billwatch
